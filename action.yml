name: "Merge Gatekeeper"
description: "Get better merge control"
branding:
  icon: git-merge
  color: orange
  # Required permissions: checks: read, statuses: read, actions: read
  # actions: read is needed to detect superseded workflow runs, which prevents
  # false failures when concurrent runs cancel each other.
inputs:
  token:
    description: "GitHub token (defaults to github.token when omitted; or set GITHUB_TOKEN env)"
    required: false
    default: ${{ github.token }}
  self:
    description: "set self job name"
    required: false
    default: "merge-gatekeeper"
  interval:
    description: "set validate interval second (default 5)"
    required: false
    default: "5"
  timeout:
    description: "set validate timeout second (default 600)"
    required: false
    default: "600"
  ignored:
    description: "set ignored jobs (comma-separated list)"
    required: false
    default: ""
  ref:
    description: "set ref of github repository. the ref can be a SHA, a branch name, or tag name"
    required: false
    default: ${{ github.event.pull_request.head.sha }}
  debug:
    description: "enable debug logging (also auto-enabled when GitHub Actions 'Enable debug logging' is on via ACTIONS_STEP_DEBUG)"
    required: false
    default: "false"
runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - "validate"
    - "--token=${{ inputs.token }}"
    - "--self=${{ inputs.self }}"
    - "--interval=${{ inputs.interval }}"
    - "--ref=${{ inputs.ref }}"
    - "--timeout=${{ inputs.timeout }}"
    - "--ignored=${{ inputs.ignored }}"
    - "--debug=${{ inputs.debug }}"
